name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wattsinsight_intervals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d wattsinsight_intervals_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wattsinsight_intervals_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wattsinsight_intervals_test
      APP_URL: http://127.0.0.1:3100
      API_URL: http://127.0.0.1:8787
      ADMIN_APP_URL: http://127.0.0.1:3101
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8787
      NEXT_PUBLIC_APP_NAME: WattsInsights Test
      NEXT_PUBLIC_ADMIN_APP_NAME: WattsInsights Admin Test
      NEXT_PUBLIC_MAIN_APP_URL: http://127.0.0.1:3100
      BILLING_MODE: credits
      BETTER_AUTH_SECRET: test-better-auth-secret-at-least-16
      JWT_SECRET: test-jwt-secret-at-least-16
      JWT_ISSUER: api-test
      JWT_AUDIENCE: test-clients
      ADMIN_ALLOWLIST: owner@example.test,admin@example.test
      DODO_PAYMENTS_ENVIRONMENT: test_mode
      DODO_PAYMENTS_WEBHOOK_SECRET: test-dodo-webhook-secret
      E2E_TEST_SECRET: ci-e2e-test-secret

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect production deployment scope
        id: production-deploy-scope
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          deploy_api=false
          deploy_web=false
          deploy_admin=false
          shared_changed=false

          if [[ "${{ github.event.before }}" =~ ^0+$ ]]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA")"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "$GITHUB_SHA")"
          fi

          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue

            case "${path}" in
              apps/*/package.json|apps/*/tsconfig.json)
                shared_changed=true
                ;;
              apps/api/*)
                deploy_api=true
                ;;
              apps/web/*)
                deploy_web=true
                ;;
              apps/admin/*)
                deploy_admin=true
                ;;
              packages/*|scripts/*|package.json|bun.lock|tsconfig.base.json|drizzle.config.ts|.dockerignore)
                shared_changed=true
                ;;
            esac
          done <<< "${changed_files}"

          if [[ "${shared_changed}" == "true" ]]; then
            deploy_api=true
            deploy_web=true
            deploy_admin=true
          fi

          run_migrations=false
          if [[ "${deploy_api}" == "true" || "${shared_changed}" == "true" ]]; then
            run_migrations=true
          fi

          any_deploy=false
          if [[ "${deploy_api}" == "true" || "${deploy_web}" == "true" || "${deploy_admin}" == "true" ]]; then
            any_deploy=true
          fi

          {
            echo "deploy_api=${deploy_api}"
            echo "deploy_web=${deploy_web}"
            echo "deploy_admin=${deploy_admin}"
            echo "run_migrations=${run_migrations}"
            echo "any_deploy=${any_deploy}"
          } > production-deploy.env

          cat production-deploy.env

      - name: Upload production deployment scope
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: production-deploy-scope
          path: production-deploy.env
          retention-days: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run migrations
        run: bun run db:migrate

      - name: Run CI checks
        run: bun run test:ci

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore

      - name: Upload coverage
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            apps/api/coverage
            apps/web/coverage
            apps/admin/coverage
            packages/frontend-shared/coverage
          if-no-files-found: ignore
