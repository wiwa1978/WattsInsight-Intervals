name: Azure App Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      confirm_ci_bypass:
        description: "Type deploy-without-ci to deploy production without waiting for CI."
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  BUN_VERSION: 1.3.14
  POSTGRES_FIREWALL_RESOURCE_GROUP_NAME: ${{ vars.POSTGRES_FIREWALL_RESOURCE_GROUP_NAME || 'RG-WattsInsight-Intervals' }}
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'workflow_dispatch' &&
        github.event.inputs.confirm_ci_bypass == 'deploy-without-ci')
    outputs:
      deploy_api: ${{ steps.detect.outputs.deploy_api }}
      deploy_web: ${{ steps.detect.outputs.deploy_web }}
      deploy_admin: ${{ steps.detect.outputs.deploy_admin }}
      run_migrations: ${{ steps.detect.outputs.run_migrations }}
      any_deploy: ${{ steps.detect.outputs.any_deploy }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download production deployment scope
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: production-deploy-scope
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: .github/deploy-scope

      - name: Detect changed apps
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          deploy_api=false
          deploy_web=false
          deploy_admin=false
          run_migrations=false
          any_deploy=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            deploy_api=true
            deploy_web=true
            deploy_admin=true
            run_migrations=true
            any_deploy=true
          else
            source .github/deploy-scope/production-deploy.env
          fi

          {
            echo "deploy_api=${deploy_api}"
            echo "deploy_web=${deploy_web}"
            echo "deploy_admin=${deploy_admin}"
            echo "run_migrations=${run_migrations}"
            echo "any_deploy=${any_deploy}"
          } >> "${GITHUB_OUTPUT}"

          printf 'deploy_api=%s\n' "${deploy_api}"
          printf 'deploy_web=%s\n' "${deploy_web}"
          printf 'deploy_admin=%s\n' "${deploy_admin}"
          printf 'run_migrations=%s\n' "${run_migrations}"
          printf 'any_deploy=%s\n' "${any_deploy}"

  no-op:
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.any_deploy != 'true'
    steps:
      - name: No production app deployment needed
        run: echo "No production app deployment needed for this change."

  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60
    needs: changes
    if: >-
      needs.changes.result == 'success' &&
      needs.changes.outputs.any_deploy == 'true'
    env:
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'swedencentral' }}
      AZURE_RESOURCE_GROUP_NAME: ${{ vars.AZURE_RESOURCE_GROUP_NAME || 'RG-WattsInsight-Intervals' }}
      AZURE_ENVIRONMENT_NAME: ${{ vars.AZURE_ENVIRONMENT_NAME || 'production' }}
      APP_NAME: ${{ vars.APP_NAME || 'WattsInsights' }}
      NEXT_PUBLIC_APP_NAME: ${{ vars.NEXT_PUBLIC_APP_NAME || 'WattsInsights' }}
      NEXT_PUBLIC_ADMIN_APP_NAME: ${{ vars.NEXT_PUBLIC_ADMIN_APP_NAME || 'WattsInsights Admin' }}
      BILLING_MODE: ${{ vars.BILLING_MODE || 'credits' }}
      POSTGRES_SERVER_FQDN: ${{ vars.POSTGRES_SERVER_FQDN }}
      POSTGRES_ADMIN_LOGIN: ${{ vars.POSTGRES_ADMIN_LOGIN }}
      POSTGRES_DATABASE_NAME: ${{ vars.POSTGRES_DATABASE_NAME }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Validate external PostgreSQL configuration
        shell: bash
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          required_vars=(POSTGRES_SERVER_FQDN POSTGRES_ADMIN_LOGIN POSTGRES_DATABASE_NAME POSTGRES_ADMIN_PASSWORD)
          for name in "${required_vars[@]}"; do
            if [[ -z "${!name}" ]]; then
              printf 'Missing required production database setting: %s\n' "${name}" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: >-
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Select Azure subscription
        shell: bash
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          az account set --subscription "${AZURE_SUBSCRIPTION_ID}"

      - name: Resolve existing Azure resources
        id: azure
        shell: bash
        run: |
          set -euo pipefail

          normalized_name="$(printf '%s' "${APP_NAME}" | tr '[:upper:]_' '[:lower:]-')"
          api_app_name="${normalized_name}-api"
          web_app_name="${normalized_name}-web"
          admin_app_name="${normalized_name}-admin"
          api_app_name="${api_app_name:0:32}"
          web_app_name="${web_app_name:0:32}"
          admin_app_name="${admin_app_name:0:32}"

          require_single_match() {
            local resource_name="$1"
            local resource_json="$2"
            local count
            count="$(jq 'length' <<< "${resource_json}")"
            if [[ "${count}" -ne 1 ]]; then
              printf 'Expected exactly one %s tagged app=%s environment=%s in resource group %s, found %s. Run Azure Production Infra to repair tags/resources.\n' \
                "${resource_name}" "${APP_NAME}" "${AZURE_ENVIRONMENT_NAME}" "${AZURE_RESOURCE_GROUP_NAME}" "${count}" >&2
              exit 1
            fi
          }

          acr_json="$(az acr list \
            --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
            --output json \
            | jq --arg app "${APP_NAME}" --arg env "${AZURE_ENVIRONMENT_NAME}" \
              '.[] | select(.tags.app == $app and .tags.environment == $env)' \
            | jq -s '.')"
          require_single_match "ACR" "${acr_json}"
          acr_name="$(jq -er '.[0].name' <<< "${acr_json}")"
          acr_login_server="$(jq -er '.[0].loginServer' <<< "${acr_json}")"

          api_fqdn="$(az containerapp show \
            --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
            --name "${api_app_name}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          web_fqdn="$(az containerapp show \
            --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
            --name "${web_app_name}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          admin_fqdn="$(az containerapp show \
            --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
            --name "${admin_app_name}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"

          {
            echo "acr_name=${acr_name}"
            echo "acr_login_server=${acr_login_server}"
            echo "api_app_name=${api_app_name}"
            echo "web_app_name=${web_app_name}"
            echo "admin_app_name=${admin_app_name}"
            echo "api_url=https://${api_fqdn}"
            echo "web_url=https://${web_fqdn}"
            echo "admin_url=https://${admin_fqdn}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to Azure Container Registry
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ steps.azure.outputs.acr_name }}"

      - name: Build and push API image
        id: api-image
        if: needs.changes.outputs.deploy_api == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.azure.outputs.acr_login_server }}/api:${DEPLOY_SHA}-${GITHUB_RUN_ID}"
          docker build \
            --file apps/api/Dockerfile \
            --tag "${image}" \
            .
          docker push "${image}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Build and push web image
        id: web-image
        if: needs.changes.outputs.deploy_web == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.azure.outputs.acr_login_server }}/web:${DEPLOY_SHA}-${GITHUB_RUN_ID}"
          docker build \
            --file apps/web/Dockerfile \
            --tag "${image}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ steps.azure.outputs.web_url }}" \
            --build-arg NEXT_PUBLIC_ADMIN_APP_URL="${{ steps.azure.outputs.admin_url }}" \
            --build-arg NEXT_PUBLIC_APP_NAME="${NEXT_PUBLIC_APP_NAME}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.azure.outputs.api_url }}" \
            .
          docker push "${image}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Build and push admin image
        id: admin-image
        if: needs.changes.outputs.deploy_admin == 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.azure.outputs.acr_login_server }}/admin:${DEPLOY_SHA}-${GITHUB_RUN_ID}"
          docker build \
            --file apps/admin/Dockerfile \
            --tag "${image}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ steps.azure.outputs.admin_url }}" \
            --build-arg NEXT_PUBLIC_APP_NAME="${NEXT_PUBLIC_ADMIN_APP_NAME}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ steps.azure.outputs.api_url }}" \
            --build-arg NEXT_PUBLIC_MAIN_APP_URL="${{ steps.azure.outputs.web_url }}" \
            .
          docker push "${image}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Add temporary PostgreSQL firewall rule
        id: postgres-firewall
        if: needs.changes.outputs.run_migrations == 'true'
        shell: bash
        run: |
          set -euo pipefail
          runner_ip="$(curl -fsSL https://api.ipify.org)"
          postgres_server_name="${POSTGRES_SERVER_FQDN%%.postgres.database.azure.com}"
          rule_name="github-actions-${GITHUB_RUN_ID}"
          az postgres flexible-server firewall-rule create \
            --resource-group "${POSTGRES_FIREWALL_RESOURCE_GROUP_NAME}" \
            --name "${postgres_server_name}" \
            --rule-name "${rule_name}" \
            --start-ip-address "${runner_ip}" \
            --end-ip-address "${runner_ip}" \
            --output none
          {
            echo "postgres_server_name=${postgres_server_name}"
            echo "rule_name=${rule_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Run database migrations
        if: needs.changes.outputs.run_migrations == 'true'
        shell: bash
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          encoded_password="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["POSTGRES_ADMIN_PASSWORD"], safe=""))')"
          echo "::add-mask::${encoded_password}"
          export DATABASE_URL="postgresql://${POSTGRES_ADMIN_LOGIN}:${encoded_password}@${POSTGRES_SERVER_FQDN}:5432/${POSTGRES_DATABASE_NAME}?sslmode=require"
          echo "::add-mask::${DATABASE_URL}"
          for attempt in {1..6}; do
            if bun run db:migrate; then
              exit 0
            fi

            if [[ "${attempt}" -eq 6 ]]; then
              echo "Database migration failed after ${attempt} attempts." >&2
              exit 1
            fi

            echo "Database migration attempt ${attempt} failed; retrying in 10 seconds." >&2
            sleep 10
          done

      - name: Remove temporary PostgreSQL firewall rule
        if: always() && needs.changes.outputs.run_migrations == 'true' && steps.postgres-firewall.outputs.postgres_server_name != '' && steps.postgres-firewall.outputs.rule_name != ''
        shell: bash
        run: |
          set -euo pipefail
          az postgres flexible-server firewall-rule delete \
            --resource-group "${POSTGRES_FIREWALL_RESOURCE_GROUP_NAME}" \
            --name "${{ steps.postgres-firewall.outputs.postgres_server_name }}" \
            --rule-name "${{ steps.postgres-firewall.outputs.rule_name }}" \
            --yes \
            --output none

      - name: Deploy API image
        id: deploy-api
        if: needs.changes.outputs.deploy_api == 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest_revision="$(az containerapp update \
            --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
            --name "${{ steps.azure.outputs.api_app_name }}" \
            --image "${{ steps.api-image.outputs.image }}" \
            --set-env-vars "BILLING_MODE=${BILLING_MODE}" \
            --query properties.latestRevisionName \
            --output tsv)"
          echo "latest_revision=${latest_revision}" >> "${GITHUB_OUTPUT}"

      - name: Deploy web image
        id: deploy-web
        if: needs.changes.outputs.deploy_web == 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest_revision="$(az containerapp update \
            --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
            --name "${{ steps.azure.outputs.web_app_name }}" \
            --image "${{ steps.web-image.outputs.image }}" \
            --query properties.latestRevisionName \
            --output tsv)"
          echo "latest_revision=${latest_revision}" >> "${GITHUB_OUTPUT}"

      - name: Deploy admin image
        id: deploy-admin
        if: needs.changes.outputs.deploy_admin == 'true'
        shell: bash
        run: |
          set -euo pipefail
          latest_revision="$(az containerapp update \
            --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
            --name "${{ steps.azure.outputs.admin_app_name }}" \
            --image "${{ steps.admin-image.outputs.image }}" \
            --query properties.latestRevisionName \
            --output tsv)"
          echo "latest_revision=${latest_revision}" >> "${GITHUB_OUTPUT}"

      - name: Wait for API revision
        if: needs.changes.outputs.deploy_api == 'true'
        shell: bash
        env:
          APP_NAME_TO_WAIT: ${{ steps.azure.outputs.api_app_name }}
          LATEST_REVISION: ${{ steps.deploy-api.outputs.latest_revision }}
        run: |
          set -euo pipefail
          latest_revision="${LATEST_REVISION}"
          for attempt in {1..30}; do
            running_state="$(az containerapp revision show \
              --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
              --name "${APP_NAME_TO_WAIT}" \
              --revision "${latest_revision}" \
              --query properties.runningState \
              --output tsv 2>/dev/null || true)"
            ready_revision="$(az containerapp show \
              --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
              --name "${APP_NAME_TO_WAIT}" \
              --query properties.latestReadyRevisionName \
              --output tsv)"

            if [[ "${running_state}" == "Running" && "${ready_revision}" == "${latest_revision}" ]]; then
              exit 0
            fi

            printf 'Waiting for %s revision %s readiness; running=%s ready=%s attempt=%s\n' \
              "${APP_NAME_TO_WAIT}" "${latest_revision}" "${running_state}" "${ready_revision}" "${attempt}"
            sleep 10
          done

          printf 'Revision %s for %s did not become latest ready revision.\n' "${latest_revision}" "${APP_NAME_TO_WAIT}" >&2
          exit 1

      - name: Wait for web revision
        if: needs.changes.outputs.deploy_web == 'true'
        shell: bash
        env:
          APP_NAME_TO_WAIT: ${{ steps.azure.outputs.web_app_name }}
          LATEST_REVISION: ${{ steps.deploy-web.outputs.latest_revision }}
        run: |
          set -euo pipefail
          latest_revision="${LATEST_REVISION}"
          for attempt in {1..30}; do
            running_state="$(az containerapp revision show \
              --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
              --name "${APP_NAME_TO_WAIT}" \
              --revision "${latest_revision}" \
              --query properties.runningState \
              --output tsv 2>/dev/null || true)"
            ready_revision="$(az containerapp show \
              --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
              --name "${APP_NAME_TO_WAIT}" \
              --query properties.latestReadyRevisionName \
              --output tsv)"

            if [[ "${running_state}" == "Running" && "${ready_revision}" == "${latest_revision}" ]]; then
              exit 0
            fi

            printf 'Waiting for %s revision %s readiness; running=%s ready=%s attempt=%s\n' \
              "${APP_NAME_TO_WAIT}" "${latest_revision}" "${running_state}" "${ready_revision}" "${attempt}"
            sleep 10
          done

          printf 'Revision %s for %s did not become latest ready revision.\n' "${latest_revision}" "${APP_NAME_TO_WAIT}" >&2
          exit 1

      - name: Wait for admin revision
        if: needs.changes.outputs.deploy_admin == 'true'
        shell: bash
        env:
          APP_NAME_TO_WAIT: ${{ steps.azure.outputs.admin_app_name }}
          LATEST_REVISION: ${{ steps.deploy-admin.outputs.latest_revision }}
        run: |
          set -euo pipefail
          latest_revision="${LATEST_REVISION}"
          for attempt in {1..30}; do
            running_state="$(az containerapp revision show \
              --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
              --name "${APP_NAME_TO_WAIT}" \
              --revision "${latest_revision}" \
              --query properties.runningState \
              --output tsv 2>/dev/null || true)"
            ready_revision="$(az containerapp show \
              --resource-group "${AZURE_RESOURCE_GROUP_NAME}" \
              --name "${APP_NAME_TO_WAIT}" \
              --query properties.latestReadyRevisionName \
              --output tsv)"

            if [[ "${running_state}" == "Running" && "${ready_revision}" == "${latest_revision}" ]]; then
              exit 0
            fi

            printf 'Waiting for %s revision %s readiness; running=%s ready=%s attempt=%s\n' \
              "${APP_NAME_TO_WAIT}" "${latest_revision}" "${running_state}" "${ready_revision}" "${attempt}"
            sleep 10
          done

          printf 'Revision %s for %s did not become latest ready revision.\n' "${latest_revision}" "${APP_NAME_TO_WAIT}" >&2
          exit 1

      - name: Check API health
        if: needs.changes.outputs.deploy_api == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --retry 12 --retry-delay 10 --retry-all-errors "${{ steps.azure.outputs.api_url }}/health" >/dev/null

      - name: Print production URLs
        shell: bash
        run: |
          set -euo pipefail
          printf 'API: %s\n' "${{ steps.azure.outputs.api_url }}"
          printf 'Web: %s\n' "${{ steps.azure.outputs.web_url }}"
          printf 'Admin: %s\n' "${{ steps.azure.outputs.admin_url }}"
